  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ── VARIABLES ─────────────────────────────────── */
    :root{
      --bg:       #08090f;
      --card:     #0d1220;
      --card2:    #111928;
      --green:    #00dc64;
      --greenl:   #7dff9e;
      --teal:     #00c8d7;
      --lime:     #c0ff00;
      --text:     #f0f2f8;
      --sub:      #6e7e9a;
      --border:   rgba(255,255,255,0.07);
      /* position */
      --del-a:#7a1208; --del-b:#c02a1e; --del-c:#e05040;
      --med-a:#0a3818; --med-b:#166830; --med-c:#1e9248;
      --def-a:#0a2650; --def-b:#104890; --def-c:#1868c0;
      --por-a:#503208; --por-b:#906018; --por-c:#c09030;
    }

    /* ── RESET ─────────────────────────────────────── */
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

    /* ── AURORA BACKGROUND ─────────────────────────── */
    #aurora{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
    .blob{position:absolute;border-radius:50%;filter:blur(90px);will-change:transform}
    .b1{width:55vw;height:55vh;top:-18vh;left:-12vw;
        background:radial-gradient(circle,rgba(180,255,0,.55) 0%,rgba(0,210,80,.25) 55%,transparent 100%);
        animation:fl1 14s ease-in-out infinite alternate}
    .b2{width:50vw;height:65vh;top:10vh;left:-5vw;
        background:radial-gradient(circle,rgba(0,210,200,.5) 0%,rgba(0,160,255,.2) 55%,transparent 100%);
        animation:fl2 18s ease-in-out infinite alternate}
    .b3{width:48vw;height:50vh;bottom:-12vh;right:0;
        background:radial-gradient(circle,rgba(0,255,120,.38) 0%,rgba(0,180,80,.15) 60%,transparent 100%);
        animation:fl3 12s ease-in-out infinite alternate}
    @keyframes fl1{to{transform:translate(4vw,6vh) scale(1.08)}}
    @keyframes fl2{to{transform:translate(-3vw,-4vh) scale(.94)}}
    @keyframes fl3{to{transform:translate(-5vw,3vh) scale(1.06)}}

    /* ── HEADER ────────────────────────────────────── */
    header{
      position:relative;z-index:20;
      background:rgba(6,8,16,.85);
      backdrop-filter:blur(18px);
      border-bottom:1px solid rgba(0,220,100,.18);
      box-shadow:0 4px 40px rgba(0,0,0,.5);
    }
    .hi{max-width:1200px;margin:0 auto;padding:16px 28px;display:flex;align-items:center;gap:16px}

    /* EA badge — replicates logo */
    .ea-badge{
      position:relative;flex-shrink:0;
      width:52px;height:52px;
      border-radius:50%;
      background:#fff;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      box-shadow:0 0 24px rgba(0,220,100,.3);
    }
    .ea-badge .ea{font-family:'Arial Black',sans-serif;font-size:14px;font-weight:900;color:#000;line-height:1}
    .ea-badge .sp{font-size:6.5px;font-weight:700;color:#000;letter-spacing:.5px;font-family:Arial,sans-serif}

    /* FC26 title */
    .fc26{
      font-family:'Rajdhani',sans-serif;
      font-size:2.7rem;font-weight:700;font-style:normal;
      color:#fff;letter-spacing:3px;line-height:1;
      text-shadow:0 0 40px rgba(0,220,100,.35);
    }
    .fc26 span{color:var(--green)}

    .hline{width:1px;height:36px;background:rgba(255,255,255,.1);flex-shrink:0}
    .htag{font-size:.62rem;letter-spacing:2px;color:var(--sub);text-transform:uppercase}
    .hright{margin-left:auto;display:flex;align-items:center;gap:7px;font-size:.68rem;letter-spacing:1.5px;color:var(--sub)}
    .hpulse{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(0,220,100,.4)}50%{opacity:.5}100%{box-shadow:0 0 0 6px rgba(0,220,100,0)}}

    /* ── FILTROS ───────────────────────────────────── */
    .fw{position:relative;z-index:10;max-width:1200px;margin:32px auto 0;padding:0 24px}
    .fp{
      background:rgba(13,18,32,.9);
      backdrop-filter:blur(16px);
      border:1px solid rgba(0,220,100,.15);
      border-radius:16px;
      padding:24px 28px;
      box-shadow:0 8px 40px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.04);
    }
    .flabel{
      font-family:'Rajdhani',sans-serif;
      font-size:.95rem;font-weight:700;letter-spacing:3px;
      color:var(--green);text-transform:uppercase;
      display:flex;align-items:center;gap:10px;margin-bottom:18px;
    }
    .flabel::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(0,220,100,.3),transparent)}

    .frow{display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end}
    .fg{display:flex;flex-direction:column;gap:6px;flex:1;min-width:185px}
    label{font-size:.62rem;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:1.5px}

    input[type=number],select{
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.1);
      border-radius:9px;color:var(--text);
      font-family:'Inter',sans-serif;font-size:.9rem;
      padding:11px 14px;outline:none;width:100%;
      transition:border-color .2s,box-shadow .2s,background .2s;
      -moz-appearance:textfield;
    }
    input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none}
    input:focus,select:focus{
      border-color:var(--green);
      background:rgba(0,220,100,.06);
      box-shadow:0 0 0 3px rgba(0,220,100,.12);
    }
    select option{background:#0d1220}

    .btn{
      background:linear-gradient(135deg,var(--greenl) 0%,var(--green) 60%,#009944 100%);
      border:none;border-radius:9px;color:#050a0e;cursor:pointer;
      font-family:'Rajdhani',sans-serif;font-size:1.1rem;font-weight:700;
      letter-spacing:3px;padding:12px 32px;text-transform:uppercase;
      transition:transform .15s,box-shadow .2s;
      box-shadow:0 4px 20px rgba(0,220,100,.3);flex-shrink:0;white-space:nowrap;
    }
    .btn:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,220,100,.5)}
    .btn:active{transform:translateY(0)}

    /* legend */
    .legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:14px}
    .leg{display:flex;align-items:center;gap:6px;font-size:.67rem;color:var(--sub)}
    .ldot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
    .ldot.DEL{background:var(--del-b)} .ldot.MED{background:var(--med-b)} .ldot.DEF{background:var(--def-b)} .ldot.POR{background:var(--por-b)}

    /* ── STATS ─────────────────────────────────────── */
    .sw{position:relative;z-index:10;max-width:1200px;margin:14px auto 0;padding:0 24px;display:none}
    .srow{display:flex;gap:10px;flex-wrap:wrap}
    .chip{
      background:rgba(13,18,32,.9);backdrop-filter:blur(12px);
      border:1px solid var(--border);border-radius:7px;
      padding:7px 14px;font-size:.73rem;color:var(--sub);
    }
    .chip b{color:var(--green);font-weight:600}

    /* ── GRID ──────────────────────────────────────── */
    .rw{position:relative;z-index:10;max-width:1200px;margin:22px auto 70px;padding:0 24px}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(172px,1fr));gap:20px}

    /* ══ NEÓN DARK CARD ════════════════════════════ */
    .card{
      background:#08090e;
      border:1px solid rgba(255,255,255,.07);
      border-radius:10px;overflow:hidden;position:relative;
      transition:transform .3s cubic-bezier(.34,1.56,.64,1),box-shadow .3s;
      cursor:default;
      display:flex;flex-direction:column;
    }

    /* Thin neon accent bar at top */
    .c-bar{height:3px;width:100%;flex-shrink:0}
    .card.DEL .c-bar{background:linear-gradient(90deg,#c01818,#ff4040,#c01818)}
    .card.MED .c-bar{background:linear-gradient(90deg,#009040,var(--green),#009040)}
    .card.DEF .c-bar{background:linear-gradient(90deg,#1050b0,#3d9eff,#1050b0)}
    .card.POR .c-bar{background:linear-gradient(90deg,#a06010,#ffb03d,#a06010)}

    /* Photo area */
    .c-photo{
      position:relative;flex:0 0 175px;height:175px;overflow:hidden;
      background:rgba(255,255,255,.02);

// ── GENERADOR DE STATS ────────────────────────────────────────────────────────
function genStats(j) {
  let h = 5381;
  for(let i=0;i<j.nombre.length;i++){h=Math.imul(h,33)^j.nombre.charCodeAt(i);h|=0}
  const rng=(mn,mx)=>{h^=h<<13;h^=h>>17;h^=h<<5;return mn+Math.abs(h)%(mx-mn+1)};
  const b = j.media;
  if(j.pos==='POR') return [
    {k:'DIV',v:Math.min(99,rng(b-2,b+4))},
    {k:'HAN',v:Math.min(99,rng(b-4,b+2))},
    {k:'KIC',v:Math.min(99,rng(b-14,b-3))},
    {k:'REF',v:Math.min(99,rng(b-2,b+5))},
    {k:'VEL',v:Math.min(99,rng(b-20,b-7))},
    {k:'POS',v:Math.min(99,rng(b-4,b+4))},
  ];
  const w={DEL:[1.0,1.04,0.78,0.97,0.42,0.88],MED:[0.87,0.83,1.02,0.95,0.74,0.85],DEF:[0.85,0.54,0.82,0.77,1.04,0.97]};
  const ww=w[j.pos]||w.MED;
  return['RIT','TIR','PAS','REG','DEF','FÍS'].map((k,i)=>({k,v:Math.min(99,Math.max(36,Math.round(b*ww[i])+rng(-3,5)))}));
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function fmt(n){
  if(n>=1_000_000){const m=n/1_000_000;return`€${Number.isInteger(m)?m:m.toFixed(1)}M`}
  return`€${Math.round(n/1000)}K`
}
function posLabel(p){return{DEL:'Delantero',MED:'Mediocampista',DEF:'Defensa',POR:'Arquero'}[p]}
function init(n){const p=n.split(' ');return p[p.length-1][0].toUpperCase()}

// ── ERROR handler ─────────────────────────────────────────────────────────────
function imgErr(img){
  img.classList.add('err');
  const initEl = img.nextElementSibling;
  if(initEl) initEl.style.display='flex';
}

// ── CARGA DE FOTOS DE WIKIPEDIA ───────────────────────────────────────────────
async function loadWikiPhotos(players, grid) {
  const imgs  = grid.querySelectorAll('.c-img');
  const inits = grid.querySelectorAll('.c-init');
  players.forEach(async (j, i) => {
    if (!j.wiki || !imgs[i]) return;
    try {
      const url = `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(j.wiki)}`;
      const r = await fetch(url, {referrerPolicy:'no-referrer'});
      if (!r.ok) return;
      const data = await r.json();
      const thumb = data?.thumbnail?.source;
      if (thumb) {
        const big = thumb.replace(/\/\d+px-/, '/400px-');
        imgs[i].onload = () => {
          imgs[i].classList.remove('err');
          if (inits[i]) inits[i].style.display = 'none';
        };
        imgs[i].src = big;
      }
    } catch(e) {}
  });
}

// ── RENDER CARD (Neón Dark) ───────────────────────────────────────────────────
function card(j){
  const stats = genStats(j);
  const statsHtml = stats.map(s=>`<div class="c-stat"><span class="c-sv">${s.v}</span><span class="c-sk">${s.k}</span></div>`).join('');
  const initials = init(j.nombre);
  const tag = j.promesa ? '<span class="c-tag">⭐ Promesa</span>' : `<span class="c-tag">${j.abr}</span>`;
  return`<div class="card ${j.pos}">
    <div class="c-bar"></div>
    <div class="c-photo">
      <div class="c-rating">
        <span class="c-ovr">${j.media}</span>
        <span class="c-pos">${j.abr}</span>
      </div>
      <div class="c-img-wrap">
        <img class="c-img"
             src="${CDN(j.fid)}"
             alt="${j.nombre}"
             referrerpolicy="no-referrer"
             crossorigin="anonymous"
             onerror="imgErr(this)">
        <div class="c-init">${initials}</div>
      </div>
    </div>
    <div class="c-sep"></div>
    <div class="c-info">
      <div class="c-name">${j.nombre}</div>
      <div class="c-meta">${j.edad} años · ${posLabel(j.pos)}</div>
      <div class="c-stats">${statsHtml}</div>
      <div class="c-bottom">
        <span class="c-price">${fmt(j.precio)}</span>
        ${tag}
      </div>
    </div>
  </div>`
}

// ── BUSCAR ────────────────────────────────────────────────────────────────────
function buscar(){
  const budget=+document.getElementById('budget').value;
  const pos=document.getElementById('position').value;
  const grid=document.getElementById('grid');
  const empty=document.getElementById('empty');
  const sw=document.getElementById('sw');
  const inp=document.getElementById('budget');

  if(!budget||budget<=0){
    inp.style.borderColor='#c02a1e';
    inp.style.boxShadow='0 0 0 3px rgba(192,42,30,.18)';
    setTimeout(()=>{inp.style.borderColor='';inp.style.boxShadow=''},1400);
    return;
  }

  let res=jugadores.filter(j=>j.precio<=budget);
  if(pos!=='ALL') res=res.filter(j=>j.pos===pos);
  res.sort((a,b)=>a.precio-b.precio);
  grid.innerHTML='';

  if(!res.length){
    empty.style.display='block'; sw.style.display='none';
  } else {
    empty.style.display='none';
    grid.innerHTML=res.map(card).join('');
    loadWikiPhotos(res, grid);
    const pr=res.map(j=>j.precio);
    const avg=(res.reduce((s,j)=>s+j.media,0)/res.length).toFixed(1);
    document.getElementById('sCount').textContent=res.length;
    document.getElementById('sMin').textContent=fmt(Math.min(...pr));
    document.getElementById('sMax').textContent=fmt(Math.max(...pr));
    document.getElementById('sAvg').textContent=avg;
    sw.style.display='block';
  }
  grid.scrollIntoView({behavior:'smooth',block:'start'});
}

document.getElementById('budget').addEventListener('keydown',e=>{if(e.key==='Enter')buscar()});
